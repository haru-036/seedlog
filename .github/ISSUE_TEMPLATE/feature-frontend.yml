name: "✨ 新機能・改善 (フロントエンド)"
description: "フロントエンド（画面・UI）に関する新機能や改善の提案"
title: "[FE] "
labels: ["frontend", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        フロントエンドの新機能・改善提案ありがとうございます！
        できる範囲で構わないので、なるべく具体的に書いてもらえると実装しやすくなります 🙏

  - type: textarea
    id: summary
    attributes:
      label: "📝 概要"
      description: "何をしたいか・なぜ必要かを教えてください"
      placeholder: "例: ログ一覧ページで検索できるようにしたい。今は全件表示されて目的のログが探しにくい。"
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: "👤 ユーザーストーリー（任意）"
      description: "「〜として、〜したい、なぜなら〜」の形式で書くと伝わりやすいです"
      placeholder: |
        ユーザーとして、
        ログをキーワードで検索したい、
        なぜなら特定の内容を素早く見つけたいから。
    validations:
      required: false

  - type: textarea
    id: hints
    attributes:
      label: "💡 実装のヒント・参考（任意）"
      description: "関連するファイル・コンポーネント、参考にしたいUIや実装のアイデアがあれば"
      placeholder: |
        - web/src/pages/Logs.tsx あたりに検索バーを追加する？
        - Linear の検索UIが参考になりそう
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "🔥 優先度"
      description: "どのくらい急ぎか選んでください"
      options:
        - "P0 — 必須（ないと困る）"
        - "P1 — 重要（あると良い）"
        - "P2 — あれば嬉しい"
    validations:
      required: true
